<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Signal Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0D1117; --surface:#161B22; --card:#1C2333; --border:#30363D; --dim:#21262D;
    --text:#E6EDF3; --muted:#7D8590; --faint:#484F58;
    --gold:#F0B429; --green:#3FB950; --blue:#58A6FF; --red:#F85149; --amber:#E3A008;
    --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; padding:20px 16px 48px; }

  .header { margin-bottom:20px; }
  .header-top { display:flex; align-items:baseline; gap:10px; margin-bottom:3px; }
  .header h1 { font-family:var(--mono); font-size:20px; font-weight:700; letter-spacing:-0.5px; }
  .badge { font-family:var(--mono); font-size:9px; font-weight:700; color:var(--gold); letter-spacing:2px; }
  .header p { font-size:11px; color:var(--faint); }

  .sport-tabs { display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
  .sport-tabs::-webkit-scrollbar { display:none; }
  .sport-tab { flex-shrink:0; padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--faint); font-family:var(--mono); font-size:11px; font-weight:700; cursor:pointer; letter-spacing:0.8px; transition:all 0.15s; }
  .sport-tab.active { border-color:var(--blue); background:rgba(88,166,255,0.12); color:var(--blue); }

  .stats { display:flex; gap:8px; margin-bottom:14px; }
  .stat { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 14px; min-width:0; }
  .stat-label { font-size:8px; color:var(--faint); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:4px; }
  .stat-value { font-family:var(--mono); font-size:20px; font-weight:700; }

  .controls { display:flex; gap:8px; margin-bottom:14px; align-items:center; flex-wrap:wrap; }
  .btn-primary { padding:7px 16px; border-radius:7px; border:1px solid rgba(240,180,41,0.6); background:rgba(240,180,41,0.1); color:var(--gold); font-family:var(--mono); font-size:11px; font-weight:700; cursor:pointer; letter-spacing:0.8px; white-space:nowrap; }
  .btn-primary:disabled { opacity:0.4; cursor:default; }
  .last-update { font-family:var(--mono); font-size:9px; color:var(--faint); }
  .filter-group { display:flex; gap:5px; align-items:center; margin-left:auto; }
  .filter-label { font-size:9px; color:var(--faint); }
  .filter-btn { padding:4px 10px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--faint); font-family:var(--mono); font-size:10px; font-weight:700; cursor:pointer; }
  .filter-btn[data-n="2"].active { color:var(--blue); border-color:var(--blue); background:rgba(88,166,255,0.1); }
  .filter-btn[data-n="3"].active { color:var(--green); border-color:var(--green); background:rgba(63,185,80,0.1); }
  .filter-btn[data-n="4"].active { color:var(--gold); border-color:var(--gold); background:rgba(240,180,41,0.1); }
  .filter-btn[data-n="1"].active { color:var(--border); border-color:var(--border); }

  .legend { display:flex; gap:12px; padding:8px 12px; margin-bottom:14px; background:var(--surface); border:1px solid var(--dim); border-radius:8px; flex-wrap:wrap; align-items:center; }
  .legend-item { display:flex; align-items:center; gap:5px; }
  .legend-dot { width:7px; height:7px; border-radius:2px; flex-shrink:0; }
  .legend-item span { font-size:9px; color:var(--muted); }

  .error-box { padding:12px 14px; border-radius:8px; margin-bottom:14px; background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); font-family:var(--mono); font-size:10px; color:var(--red); line-height:1.6; }
  .empty { text-align:center; padding:56px 20px; font-family:var(--mono); font-size:12px; color:var(--faint); }
  .empty-icon { font-size:28px; margin-bottom:10px; }

  /* Cards */
  .cards { display:flex; flex-direction:column; gap:8px; }
  .card { background:var(--surface); border-radius:10px; border:1px solid var(--border); overflow:hidden; transition:border-color 0.2s,box-shadow 0.2s; }
  .card[data-score="3"] { border-color:rgba(63,185,80,0.4); box-shadow:0 0 20px rgba(63,185,80,0.08); }
  .card[data-score="4"] { border-color:rgba(240,180,41,0.5); box-shadow:0 0 24px rgba(240,180,41,0.1); }
  .card-main { padding:14px 16px; cursor:pointer; user-select:none; }
  .card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:11px; }
  .card-meta { font-family:var(--mono); font-size:8px; color:var(--faint); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:5px; }
  .card-teams { display:flex; align-items:center; gap:7px; }
  .team-name { font-family:var(--mono); font-size:18px; font-weight:700; }
  .team-sep { color:var(--dim); font-size:12px; }
  .card-right { display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .lean-tag { padding:4px 10px; border-radius:6px; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:0.6px; }

  /* Signal bars */
  .bars { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .bars-inner { display:flex; align-items:flex-end; gap:2px; height:22px; }
  .bar { width:6px; border-radius:2px; background:var(--dim); }
  .bar:nth-child(1){height:7px} .bar:nth-child(2){height:11px} .bar:nth-child(3){height:16px} .bar:nth-child(4){height:22px}
  .bars-score { font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:1px; margin-top:1px; }

  /* Data strip */
  .card-data { display:flex; gap:14px; padding-top:10px; border-top:1px solid var(--dim); flex-wrap:wrap; align-items:flex-start; }
  .data-label { font-size:8px; color:var(--faint); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:3px; }
  .data-value { font-family:var(--mono); font-size:12px; font-weight:600; }
  .line-compare { display:flex; gap:8px; align-items:baseline; }
  .book-label { font-size:7px; color:var(--faint); display:block; margin-bottom:1px; }
  .val-badge { font-size:8px; font-weight:700; padding:1px 4px; border-radius:3px; background:rgba(240,180,41,0.12); border:1px solid rgba(240,180,41,0.35); color:var(--gold); letter-spacing:0.5px; font-family:var(--mono); }

  /* Macro chip */
  .macro-chip { display:inline-flex; align-items:center; gap:4px; padding:2px 7px; border-radius:4px; font-size:8px; font-weight:700; font-family:var(--mono); letter-spacing:0.8px; text-transform:uppercase; }
  .macro-chip.auto-on  { background:rgba(63,185,80,0.12); border:1px solid rgba(63,185,80,0.4); color:var(--green); }
  .macro-chip.auto-off { background:rgba(248,81,73,0.08); border:1px solid rgba(248,81,73,0.3); color:var(--red); }
  .macro-chip.loading  { background:rgba(72,79,88,0.3); border:1px solid var(--dim); color:var(--faint); }
  .macro-chip.manual   { background:rgba(240,180,41,0.08); border:1px solid rgba(240,180,41,0.3); color:var(--amber); }

  .pills { margin-left:auto; display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; align-items:flex-start; }
  .pill { display:flex; align-items:center; gap:4px; padding:3px 7px; border-radius:4px; border:1px solid var(--border); background:var(--surface); }
  .pill.on { background:rgba(63,185,80,0.08); border-color:rgba(63,185,80,0.35); }
  .pill-dot { width:5px; height:5px; border-radius:50%; background:var(--dim); flex-shrink:0; }
  .pill.on .pill-dot { background:var(--green); box-shadow:0 0 4px var(--green); }
  .pill span { font-family:var(--sans); font-size:9px; font-weight:600; letter-spacing:0.7px; text-transform:uppercase; color:var(--faint); }
  .pill.on span { color:var(--green); }

  /* Expanded */
  .card-expand { padding:12px 16px 14px; border-top:1px solid var(--dim); background:var(--card); }
  .expand-title { font-size:8px; color:var(--faint); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:8px; }

  /* Macro detail */
  .macro-detail { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  .macro-stat { background:var(--surface); border:1px solid var(--dim); border-radius:6px; padding:6px 10px; }
  .macro-stat-label { font-size:7px; color:var(--faint); letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
  .macro-stat-value { font-family:var(--mono); font-size:11px; font-weight:700; }

  /* Injury toggle */
  .injury-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; padding:8px 10px; background:var(--surface); border:1px solid var(--dim); border-radius:6px; }
  .injury-label { font-size:10px; color:var(--muted); flex:1; }
  .btn-injury { padding:3px 10px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--faint); font-family:var(--sans); font-size:9px; font-weight:700; cursor:pointer; letter-spacing:0.8px; text-transform:uppercase; }
  .btn-injury.flagged { border-color:rgba(248,81,73,0.6); background:rgba(248,81,73,0.1); color:var(--red); }

  /* Manual macro (non-MLB) */
  .btn-macro { padding:3px 12px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--faint); font-family:var(--sans); font-size:9px; font-weight:700; cursor:pointer; letter-spacing:0.8px; text-transform:uppercase; }
  .btn-macro.on { border-color:rgba(63,185,80,0.6); background:rgba(63,185,80,0.1); color:var(--green); }

  /* Layer rows */
  .layer-rows { display:flex; flex-direction:column; gap:6px; }
  .layer-row { display:flex; gap:7px; align-items:flex-start; }
  .layer-dot { width:6px; height:6px; border-radius:50%; background:var(--dim); margin-top:2px; flex-shrink:0; }
  .layer-dot.on { background:var(--green); box-shadow:0 0 4px var(--green); }
  .layer-key { font-family:var(--mono); font-size:9px; font-weight:700; color:var(--faint); white-space:nowrap; }
  .layer-key.on { color:var(--green); }
  .layer-desc { font-size:9px; color:var(--muted); margin-left:4px; line-height:1.5; }

  .spinner { display:inline-block; width:10px; height:10px; border:2px solid var(--faint); border-top-color:var(--gold); border-radius:50%; animation:spin 0.7s linear infinite; margin-right:5px; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .footer { margin-top:32px; padding-top:14px; border-top:1px solid var(--dim); font-family:var(--mono); font-size:8px; color:#30363D; text-align:center; letter-spacing:0.8px; }

  @media (max-width:480px) {
    .stat-value{font-size:16px} .card-main{padding:12px 13px}
    .team-name{font-size:16px} .lean-tag{font-size:10px;padding:3px 8px}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>SIGNAL SCANNER</h1>
    <span class="badge">LIVE</span>
  </div>
  <p>Macro → Market → Correlated → Value · PIN sharp ref · DK retail line</p>
</div>

<div class="sport-tabs" id="sportTabs"></div>

<div class="stats">
  <div class="stat"><div class="stat-label">Games</div><div class="stat-value" id="statGames">—</div></div>
  <div class="stat"><div class="stat-label">High Signal</div><div class="stat-value" id="statHigh" style="color:var(--gold)">—</div></div>
  <div class="stat"><div class="stat-label">API Left</div><div class="stat-value" id="statApi">—</div></div>
</div>

<div class="controls">
  <button class="btn-primary" id="btnRefresh" onclick="refresh(true)">▶ LOAD ODDS</button>
  <span class="last-update" id="lastUpdate"></span>
  <div class="filter-group">
    <span class="filter-label">Signal:</span>
    <button class="filter-btn" data-n="1" onclick="setFilter(1)">1</button>
    <button class="filter-btn active" data-n="2" onclick="setFilter(2)">2</button>
    <button class="filter-btn" data-n="3" onclick="setFilter(3)">3</button>
    <button class="filter-btn" data-n="4" onclick="setFilter(4)">4</button>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div><span>4/4 Max conviction</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span>3/4 High signal</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div><span>2/4 Developing</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div><span>1/4 Watch</span></div>
  <span style="font-size:9px;color:var(--faint);margin-left:auto">MLB macro is auto-scored</span>
</div>

<div id="errorBox" class="error-box" style="display:none"></div>
<div id="cards" class="cards"></div>
<div class="footer" id="footer">PINNACLE = SHARP REF · DK = RETAIL LINE · MLB MACRO AUTO-SCORED VIA MLB STATS API</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API_KEY = "e95f810e37a0140a9a34d5ee986ef8c8";
const BASE    = "https://api.the-odds-api.com/v4/sports";
const MLB_API = "https://statsapi.mlb.com/api/v1";

const SPORTS = [
  { key:"baseball_mlb",         label:"MLB",   icon:"⚾" },
  { key:"americanfootball_nfl", label:"NFL",   icon:"🏈" },
  { key:"basketball_nba",       label:"NBA",   icon:"🏀" },
  { key:"icehockey_nhl",        label:"NHL",   icon:"🏒" },
  { key:"soccer_usa_mls",       label:"MLS",   icon:"⚽" },
];

const ABBR = {
  "Arizona Diamondbacks":"ARI","Atlanta Braves":"ATL","Baltimore Orioles":"BAL",
  "Boston Red Sox":"BOS","Chicago Cubs":"CHC","Chicago White Sox":"CWS",
  "Cincinnati Reds":"CIN","Cleveland Guardians":"CLE","Colorado Rockies":"COL",
  "Detroit Tigers":"DET","Houston Astros":"HOU","Kansas City Royals":"KC",
  "Los Angeles Angels":"LAA","Los Angeles Dodgers":"LAD","Miami Marlins":"MIA",
  "Milwaukee Brewers":"MIL","Minnesota Twins":"MIN","New York Mets":"NYM",
  "New York Yankees":"NYY","Oakland Athletics":"OAK","Philadelphia Phillies":"PHI",
  "Pittsburgh Pirates":"PIT","San Diego Padres":"SD","San Francisco Giants":"SF",
  "Seattle Mariners":"SEA","St. Louis Cardinals":"STL","Tampa Bay Rays":"TB",
  "Texas Rangers":"TEX","Toronto Blue Jays":"TOR","Washington Nationals":"WSH",
  "Athletics":"OAK",
};
const abbr = n => ABBR[n] || n.split(" ").slice(-1)[0].slice(0,4).toUpperCase();

// MLB team IDs for Stats API
const MLB_IDS = {
  "Arizona Diamondbacks":109,"Atlanta Braves":144,"Baltimore Orioles":110,
  "Boston Red Sox":111,"Chicago Cubs":112,"Chicago White Sox":145,
  "Cincinnati Reds":113,"Cleveland Guardians":114,"Colorado Rockies":115,
  "Detroit Tigers":116,"Houston Astros":117,"Kansas City Royals":118,
  "Los Angeles Angels":108,"Los Angeles Dodgers":119,"Miami Marlins":146,
  "Milwaukee Brewers":158,"Minnesota Twins":142,"New York Mets":121,
  "New York Yankees":147,"Oakland Athletics":133,"Philadelphia Phillies":143,
  "Pittsburgh Pirates":134,"San Diego Padres":135,"San Francisco Giants":137,
  "Seattle Mariners":136,"St. Louis Cardinals":138,"Tampa Bay Rays":139,
  "Texas Rangers":140,"Toronto Blue Jays":141,"Washington Nationals":120,
  "Athletics":133,
};

// ─── UTILS ───────────────────────────────────────────────────────────────────
const toImpl = ml => ml==null ? 0.5 : ml<0 ? (-ml)/(-ml+100) : 100/(ml+100);
const fmtML  = v  => v==null ? "—" : v>0 ? `+${v}` : `${v}`;
const sigCol  = n  => n===4?"var(--gold)":n===3?"var(--green)":n>=2?"var(--blue)":"var(--border)";

// ─── CACHE ───────────────────────────────────────────────────────────────────
const CACHE_TTL   = 5 * 60 * 1000;
const oddsCache   = {};  // sport → { games, timestamp, remaining }
const macroCache  = {};  // teamName → { restDays, roadTripGame, b2b, lastDate }

function oddsValid(key) { return oddsCache[key] && (Date.now()-oddsCache[key].timestamp < CACHE_TTL); }
function cacheLeft(key) { return oddsCache[key] ? Math.max(0, Math.ceil((CACHE_TTL-(Date.now()-oddsCache[key].timestamp))/60000)) : 0; }

// ─── STATE ───────────────────────────────────────────────────────────────────
const S = {
  sport:    SPORTS[0].key,
  games:    [],
  baseline: {},
  minScore: 2,
  expanded: {},
  injuryFlag: {},   // id → bool (manual injury override negates macro)
  macroOn:  {},     // id → bool (manual macro for non-MLB)
  macroLoading: false,
  loading:  false,
  remaining: null,
  lastUpdate: null,
};

// ─── MLB MACRO FETCH ─────────────────────────────────────────────────────────
async function fetchTeamMacro(teamName) {
  if (macroCache[teamName] !== undefined) return macroCache[teamName];

  const teamId = MLB_IDS[teamName];
  if (!teamId) { macroCache[teamName] = null; return null; }

  const today    = new Date();
  const endDate  = today.toISOString().split('T')[0];
  const start    = new Date(today - 10*86400000);
  const startDate= start.toISOString().split('T')[0];

  try {
    const url = `${MLB_API}/schedule?sportId=1&teamId=${teamId}&startDate=${startDate}&endDate=${endDate}&gameType=R`;
    const res  = await fetch(url);
    const data = await res.json();

    const games = [];
    for (const d of (data.dates||[])) {
      for (const g of (d.games||[])) {
        if (g.status?.abstractGameState === "Final") {
          const isHome = g.teams?.home?.team?.id === teamId;
          games.push({ date: d.date, isHome });
        }
      }
    }
    games.sort((a,b) => new Date(b.date)-new Date(a.date));

    if (!games.length) { macroCache[teamName] = null; return null; }

    const last     = games[0];
    const lastDate = new Date(last.date + "T12:00:00");
    const todayD   = new Date(today.toDateString());
    const restDays = Math.round((todayD - lastDate)/86400000);
    const b2b      = restDays === 0;

    // Road trip: consecutive away games
    let roadTripGame = 0;
    if (!last.isHome) {
      for (const g of games) { if (!g.isHome) roadTripGame++; else break; }
    }

    const result = { restDays, roadTripGame, b2b, lastDate: last.date, lastGameHome: last.isHome };
    macroCache[teamName] = result;
    return result;
  } catch(e) {
    macroCache[teamName] = null;
    return null;
  }
}

async function enrichMacro(games) {
  if (S.sport !== "baseball_mlb") return;
  S.macroLoading = true;
  renderCards();

  const teams = [...new Set(games.flatMap(g=>[g.homeTeam, g.awayTeam]))];
  await Promise.all(teams.map(fetchTeamMacro));

  S.macroLoading = false;
  renderCards();
  renderStats();
}

// Auto-score macro for MLB using fetched data
function autoMacro(game) {
  if (S.sport !== "baseball_mlb") return null; // null = use manual
  const hd = macroCache[game.homeTeam];
  const ad = macroCache[game.awayTeam];
  if (hd === undefined || ad === undefined) return null; // still loading
  if (!hd || !ad) return false; // data unavailable

  const leanD = game.leanSide==="home" ? hd : ad;
  const oppD  = game.leanSide==="home" ? ad : hd;

  // Negative signals — lean team at a situational DISADVANTAGE
  let negatives = 0;
  if (leanD.restDays < oppD.restDays)                          negatives++;
  if (leanD.b2b && !oppD.b2b)                                negatives++;
  if (leanD.roadTripGame >= 3 && game.leanSide==="away")     negatives++;

  // Positive signals — lean team has a situational EDGE
  let positives = 0;
  if (leanD.restDays > oppD.restDays)                          positives++;
  if (oppD.b2b && !leanD.b2b)                                positives++;
  if (oppD.roadTripGame >= 3 && game.leanSide==="home")      positives++;

  // Even rest = neutral = macro passes (no veto, no bonus)
  // Only fails when lean team is at clear disadvantage with no offsetting edge
  if (negatives > 0 && positives === 0) return false;
  return true;
}

// ─── PARSER ──────────────────────────────────────────────────────────────────
function parseGame(raw) {
  const pin = raw.bookmakers?.find(b=>b.key==="pinnacle");
  const dk  = raw.bookmakers?.find(b=>b.key==="draftkings");
  if (!pin && !dk) return null;

  const mkt = (book,key) => book?.markets?.find(m=>m.key===key);
  const out = (market,name) => market?.outcomes?.find(o=>o.name===name);

  const home=raw.home_team, away=raw.away_team;
  const pinH2H=mkt(pin,"h2h"), dkH2H=mkt(dk,"h2h");
  const pinSpr=mkt(pin,"spreads"), pinTot=mkt(pin,"totals"), dkTot=mkt(dk,"totals");

  const pinHome=out(pinH2H,home)?.price, pinAway=out(pinH2H,away)?.price;
  const dkHome =out(dkH2H, home)?.price, dkAway =out(dkH2H, away)?.price;
  const total  =pinTot?.outcomes?.[0]?.point ?? dkTot?.outcomes?.[0]?.point ?? null;
  const pinSpreadPt   =out(pinSpr,home)?.point;
  const pinSpreadJuice=out(pinSpr,home)?.price;

  let leanSide="home";
  if (pinHome&&pinAway&&dkHome&&dkAway) {
    const he=toImpl(pinHome)-toImpl(dkHome), ae=toImpl(pinAway)-toImpl(dkAway);
    if (ae>he&&ae>0.015) leanSide="away";
    else if (he>ae&&he>0.015) leanSide="home";
    else leanSide=toImpl(pinHome)>=toImpl(pinAway)?"home":"away";
  } else {
    const rH=pinHome??dkHome, rA=pinAway??dkAway;
    if (!rH||!rA) return null;
    leanSide=toImpl(rH)>=toImpl(rA)?"home":"away";
  }

  const leanTeam=leanSide==="home"?home:away;
  const pinLean =leanSide==="home"?pinHome:pinAway;
  const dkLean  =leanSide==="home"?dkHome:dkAway;
  const pinOpp  =leanSide==="home"?pinAway:pinHome;
  const dkOpp   =leanSide==="home"?dkAway:dkHome;

  const d=new Date(raw.commence_time);
  return {
    id:raw.id, homeTeam:home, awayTeam:away,
    homeAbbr:abbr(home), awayAbbr:abbr(away),
    time:d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:"America/New_York"})+" ET",
    date:d.toLocaleDateString("en-US",{month:"short",day:"numeric"}),
    leanSide, leanTeam, pinLean, dkLean, pinOpp, dkOpp,
    total, pinSpreadPt, pinSpreadJuice,
    hasPinnacle:!!pin, hasDK:!!dk,
  };
}

// ─── SCORER ──────────────────────────────────────────────────────────────────
function scoreGame(game) {
  const {leanSide,pinLean,dkLean,total,pinSpreadPt} = game;

  // L1 — Macro
  const am = autoMacro(game);
  const L1 = am !== null
    ? (am && !S.injuryFlag[game.id])   // auto result, negated by injury flag
    : !!S.macroOn[game.id];            // manual for non-MLB

  // L2 — Market: Pinnacle implied > 52%
  const L2 = game.hasPinnacle
    ? (pinLean ? toImpl(pinLean)>0.52 : false)
    : (dkLean  ? toImpl(dkLean) >0.55 : false);

  // L3 — Correlated: total + spread game script
  const isUnd=(dkLean??pinLean??0)>0;
  let L3=false;
  if (total!=null) { if (isUnd&&total<=8.0) L3=true; if (!isUnd&&total<=8.5) L3=true; }
  if (!L3&&pinSpreadPt!=null) {
    if (leanSide==="home"&&Math.abs(pinSpreadPt)<=1.5) L3=true;
    if (leanSide==="away"&&Math.abs(pinSpreadPt)>=1.5) L3=true;
  }

  // L4 — Value: DK 8+ cents better than Pinnacle
  const L4=(dkLean!=null&&pinLean!=null)?dkLean>pinLean+8:false;

  const layers={macro:L1,market:L2,correlated:L3,value:L4};
  return {layers,score:[L1,L2,L3,L4].filter(Boolean).length};
}

// ─── MOVEMENT ────────────────────────────────────────────────────────────────
function getMove(game) {
  const base=S.baseline[game.id];
  if (!base||base.pinLean==null||game.pinLean==null) return null;
  const d=game.pinLean-base.pinLean;
  return Math.abs(d)<2?null:d;
}

// ─── FETCH ────────────────────────────────────────────────────────────────────
async function refresh(force=false) {
  if (S.loading) return;
  if (!force && oddsValid(S.sport)) {
    const hit=oddsCache[S.sport];
    S.games=hit.games; S.remaining=hit.remaining;
    S.lastUpdate=new Date(hit.timestamp);
    hideError(); render(); renderCacheBadge(); return;
  }

  S.loading=true; renderControls();
  const url=`${BASE}/${S.sport}/odds/?apiKey=${API_KEY}&bookmakers=pinnacle,draftkings&markets=h2h,spreads,totals&oddsFormat=american`;

  try {
    const res=await fetch(url);
    const rem=res.headers.get("x-requests-remaining");
    if (rem) S.remaining=rem;
    if (!res.ok) { const t=await res.text(); throw new Error(`API ${res.status}: ${t}`); }
    const raw=await res.json();
    if (!Array.isArray(raw)) throw new Error("Unexpected response format.");

    const parsed=raw.map(parseGame).filter(Boolean);
    parsed.forEach(g=>{ if (!S.baseline[g.id]) S.baseline[g.id]={pinLean:g.pinLean,dkLean:g.dkLean}; });

    S.games=parsed; S.lastUpdate=new Date();
    oddsCache[S.sport]={games:parsed,remaining:S.remaining,timestamp:Date.now()};

    hideError(); render(); renderCacheBadge();

    // Async macro enrichment for MLB
    enrichMacro(parsed);

  } catch(e) { showError(e.message); }
  finally { S.loading=false; renderControls(); }
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() { renderStats(); renderCards(); }

function renderStats() {
  const high=S.games.filter(g=>scoreGame(g).score>=3).length;
  document.getElementById("statGames").textContent=S.games.length||"—";
  document.getElementById("statHigh").textContent =S.games.length?high:"—";
  const remEl=document.getElementById("statApi");
  remEl.textContent=S.remaining??"—";
  remEl.style.color=S.remaining&&parseInt(S.remaining)<50?"var(--red)":"var(--text)";
}

function renderCacheBadge() {
  const el=document.getElementById("lastUpdate");
  if (!S.lastUpdate) return;
  const t=S.lastUpdate.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  const left=cacheLeft(S.sport);
  el.textContent=left>0?`Updated ${t} · refreshes in ${left}m`:`Updated ${t}`;
}

function renderControls() {
  const btn=document.getElementById("btnRefresh");
  btn.innerHTML=S.loading?'<span class="spinner"></span>LOADING…':S.games.length?"↺ REFRESH":"▶ LOAD ODDS";
  btn.disabled=S.loading;
}

function renderCards() {
  const container=document.getElementById("cards");
  const filtered=S.games
    .map(g=>({g,s:scoreGame(g)}))
    .filter(({s})=>s.score>=S.minScore)
    .sort((a,b)=>b.s.score-a.s.score);

  if (!S.games.length) {
    container.innerHTML=`<div class="empty"><div class="empty-icon">◈</div>Hit Load Odds to pull live lines.</div>`;
    return;
  }
  if (!filtered.length) {
    container.innerHTML=`<div class="empty"><div class="empty-icon">◈</div>No games at ${S.minScore}/4 — lower filter or refresh.</div>`;
    return;
  }
  container.innerHTML=filtered.map(({g,s})=>cardHTML(g,s)).join("");
}

// ─── CARD HTML ───────────────────────────────────────────────────────────────
function macroChipHTML(game) {
  const isMLB = S.sport==="baseball_mlb";
  if (!isMLB) {
    const on=!!S.macroOn[game.id];
    return `<span class="macro-chip manual">MANUAL</span>`;
  }
  const am=autoMacro(game);
  if (am===null) return `<span class="macro-chip loading"><span class="spinner"></span>MACRO…</span>`;
  const injured=!!S.injuryFlag[game.id];
  if (injured) return `<span class="macro-chip auto-off">⚠ INJURY OVERRIDE</span>`;
  return am
    ? `<span class="macro-chip auto-on">✓ MACRO AUTO</span>`
    : `<span class="macro-chip auto-off">✗ MACRO WEAK</span>`;
}

function macroDetailHTML(game) {
  const isMLB=S.sport==="baseball_mlb";
  if (!isMLB) {
    const on=!!S.macroOn[game.id];
    return `
      <div class="expand-title">L1 · Macro (Manual — non-MLB)</div>
      <div style="margin-bottom:10px">
        <button class="btn-macro${on?" on":""}" onclick="toggleMacro('${game.id}')">
          ${on?"✓ Confirmed":"Tap to Confirm"}
        </button>
        <div style="font-size:10px;color:var(--faint);margin-top:6px;line-height:1.6">
          Rest differential · travel spot · injury impact · schedule context.
        </div>
      </div>`;
  }

  const hd=macroCache[game.homeTeam], ad=macroCache[game.awayTeam];
  const leanD=game.leanSide==="home"?hd:ad;
  const oppD =game.leanSide==="home"?ad:hd;
  const injured=!!S.injuryFlag[game.id];

  if (!hd||!ad) return `
    <div class="expand-title">L1 · Macro (Auto — MLB Stats API)</div>
    <div style="font-size:10px;color:var(--faint);margin-bottom:10px">
      ${hd===undefined||ad===undefined?"Loading schedule data…":"Could not retrieve schedule data."}
    </div>`;

  const restDiff=(leanD?.restDays??0)-(oppD?.restDays??0);
  const leanAbbr=game.leanSide==="home"?game.homeAbbr:game.awayAbbr;
  const oppAbbr =game.leanSide==="home"?game.awayAbbr:game.homeAbbr;

  return `
    <div class="expand-title">L1 · Macro (Auto — MLB Stats API)</div>
    <div class="macro-detail">
      <div class="macro-stat">
        <div class="macro-stat-label">${leanAbbr} Rest</div>
        <div class="macro-stat-value" style="color:${(leanD?.restDays??0)>0?"var(--green)":"var(--red)"}">
          ${leanD?.b2b?"B2B":`${leanD?.restDays??'?'}d`}
        </div>
      </div>
      <div class="macro-stat">
        <div class="macro-stat-label">${oppAbbr} Rest</div>
        <div class="macro-stat-value" style="color:${(oppD?.restDays??0)>0?"var(--muted)":"var(--red)"}">
          ${oppD?.b2b?"B2B":`${oppD?.restDays??'?'}d`}
        </div>
      </div>
      <div class="macro-stat">
        <div class="macro-stat-label">Rest Edge</div>
        <div class="macro-stat-value" style="color:${restDiff>0?"var(--green)":restDiff<0?"var(--red)":"var(--muted)"}">
          ${restDiff>0?`+${restDiff}d lean`:restDiff<0?`${restDiff}d lean`:"Even"}
        </div>
      </div>
      ${(oppD?.roadTripGame??0)>0?`
      <div class="macro-stat">
        <div class="macro-stat-label">${oppAbbr} Road Trip</div>
        <div class="macro-stat-value" style="color:${oppD.roadTripGame>=3?"var(--red)":"var(--amber)"}">
          G${oppD.roadTripGame} away
        </div>
      </div>`:""}
    </div>
    <div class="injury-row">
      <span class="injury-label">⚠ Key injury on lean team (${leanAbbr})?</span>
      <button class="btn-injury${injured?" flagged":""}" onclick="toggleInjury('${game.id}')">
        ${injured?"Flagged — negates macro":"Flag Injury"}
      </button>
    </div>`;
}

function cardHTML(game, {layers,score}) {
  const col=sigCol(score);
  const exp=!!S.expanded[game.id];
  const leanAbbr=game.leanSide==="home"?game.homeAbbr:game.awayAbbr;
  const leanML=game.dkLean??game.pinLean;
  const move=getMove(game);
  const implLean=game.pinLean?(toImpl(game.pinLean)*100).toFixed(1):null;
  const pinDiff=(game.dkLean!=null&&game.pinLean!=null)?game.dkLean-game.pinLean:null;
  const hasVal=pinDiff!=null&&pinDiff>8;

  const moveHTML=move!=null
    ? `<span style="font-size:9px;margin-left:3px;color:${move<0?"var(--green)":"var(--red)"}">${move<0?"▼":"▲"}${Math.abs(move)}</span>`
    : "";

  const barsHTML=["macro","market","correlated","value"].map(k=>`
    <div class="bar" style="${layers[k]?`background:${col};box-shadow:0 0 5px ${col}`:""}"></div>`).join("");

  const pillsHTML=[
    {k:"macro",l:"Macro"},{k:"market",l:"Market"},
    {k:"correlated",l:"Confirm"},{k:"value",l:"Value"}
  ].map(({k,l})=>`
    <div class="pill${layers[k]?" on":""}">
      <div class="pill-dot"></div><span>${l}</span>
    </div>`).join("");

  const layerDescs=[
    {k:"market",l:"L2 · Market",d:implLean?`Pinnacle implied ${implLean}% — ${layers.market?"sharp action confirmed":"below 52%"}`:"No Pinnacle data"},
    {k:"correlated",l:"L3 · Correlated",d:`Total ${game.total??"N/A"} · ${layers.correlated?"game script aligns":"no cross-market confirm"}`},
    {k:"value",l:"L4 · Value",d:(game.dkLean!=null&&game.pinLean!=null)?`DK ${fmtML(game.dkLean)} vs PIN ${fmtML(game.pinLean)} — ${hasVal?`+${pinDiff}¢ edge`:"< 8¢"}`:"Insufficient data"}
  ].map(({k,l,d})=>`
    <div class="layer-row">
      <div class="layer-dot${layers[k]?" on":""}"></div>
      <span class="layer-key${layers[k]?" on":""}">${l}</span>
      <span class="layer-desc">${d}</span>
    </div>`).join("");

  return `
  <div class="card" data-score="${score}" data-id="${game.id}">
    <div class="card-main" onclick="toggleExpand('${game.id}')">
      <div class="card-header">
        <div>
          <div class="card-meta">${game.date} · ${game.time}${!game.hasPinnacle?' · <span style="color:var(--red)">NO PIN</span>':''}</div>
          <div class="card-teams">
            <span class="team-name" style="color:${game.leanSide==='away'?col:'var(--muted)'}">
              ${game.awayAbbr}
            </span>
            <span class="team-sep">@</span>
            <span class="team-name" style="color:${game.leanSide==='home'?col:'var(--muted)'}">
              ${game.homeAbbr}
            </span>
          </div>
        </div>
        <div class="card-right">
          <div>
            <div class="lean-tag" style="background:${col}18;border:1px solid ${col}44;color:${col}">
              ◂ ${leanAbbr} ${fmtML(leanML)}${moveHTML}
            </div>
            <div style="margin-top:4px;text-align:right">${macroChipHTML(game)}</div>
          </div>
          <div class="bars">
            <div class="bars-inner">${barsHTML}</div>
            <div class="bars-score" style="color:${col}">${score}/4</div>
          </div>
        </div>
      </div>
      <div class="card-data">
        <div>
          <div class="data-label">Lean ML</div>
          <div class="line-compare">
            <div><span class="book-label">PIN</span><span class="data-value" style="color:var(--muted)">${fmtML(game.pinLean)}</span></div>
            <div><span class="book-label">DK</span><span class="data-value" style="color:${hasVal?"var(--gold)":"var(--text)"}">${fmtML(game.dkLean)}</span></div>
            ${hasVal?`<span class="val-badge">+${pinDiff}¢</span>`:""}
          </div>
        </div>
        <div>
          <div class="data-label">Opp ML</div>
          <div class="line-compare">
            <div><span class="book-label">PIN</span><span class="data-value" style="color:var(--muted)">${fmtML(game.pinOpp)}</span></div>
            <div><span class="book-label">DK</span><span class="data-value">${fmtML(game.dkOpp)}</span></div>
          </div>
        </div>
        <div>
          <div class="data-label">Total (PIN)</div>
          <div class="data-value">${game.total??"—"}</div>
        </div>
        ${implLean?`<div><div class="data-label">Implied</div><div class="data-value" style="color:${parseFloat(implLean)>52?"var(--green)":"var(--muted)"}">${implLean}%</div></div>`:""}
        <div class="pills">${pillsHTML}</div>
      </div>
    </div>
    ${exp?`
    <div class="card-expand">
      ${macroDetailHTML(game)}
      <div class="expand-title" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--dim)">Layer Logic</div>
      <div class="layer-rows">
        <div class="layer-row">
          <div class="layer-dot${layers.macro?" on":""}"></div>
          <span class="layer-key${layers.macro?" on":""}">L1 · Macro</span>
          <span class="layer-desc">${S.sport==="baseball_mlb"?"Auto-scored from MLB Stats API — rest, B2B, road trip":"Manual assessment required"}</span>
        </div>
        ${layerDescs}
      </div>
    </div>`:""}
  </div>`;
}

// ─── SPORT TABS ──────────────────────────────────────────────────────────────
function renderSportTabs() {
  document.getElementById("sportTabs").innerHTML=SPORTS.map(s=>`
    <button class="sport-tab${S.sport===s.key?" active":""}" onclick="setSport('${s.key}')">
      ${s.icon} ${s.label}
    </button>`).join("");
}

function setSport(key) {
  if (S.sport===key) return;
  S.sport=key; S.games=[]; S.expanded={};
  renderSportTabs(); render(); refresh();
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
function toggleExpand(id)  { S.expanded[id]=!S.expanded[id]; renderCards(); }
function toggleMacro(id)   { S.macroOn[id]=!S.macroOn[id];  renderCards(); renderStats(); }
function toggleInjury(id)  { S.injuryFlag[id]=!S.injuryFlag[id]; renderCards(); renderStats(); }
function setFilter(n)      {
  S.minScore=n;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",parseInt(b.dataset.n)===n));
  renderCards();
}
function showError(msg) {
  const el=document.getElementById("errorBox");
  el.style.display="block";
  el.innerHTML=`✕ ${msg}<br><span style="font-size:9px;opacity:0.7">Check API key or try again shortly.</span>`;
}
function hideError() { document.getElementById("errorBox").style.display="none"; }

// ─── INIT ────────────────────────────────────────────────────────────────────
renderSportTabs();
render();
refresh(true);
</script>
</body>
</html>
